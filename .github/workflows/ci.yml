name: CI

on:
  pull_request:
    branches:
      - trunk

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [11]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Gradle CLI
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '7.6'

      - name: Build
        run: gradle build --no-daemon --parallel

      - name: Run tests
        run: gradle test --no-daemon --parallel

      - name: Publish test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/**/*.xml'

      - name: Publish coverage report (runtime)
        uses: actions/upload-artifact@v4
        with:
          name: runtime-jacoco-coverage
          path: |
            runtime/build/reports/jacoco/test/**
            runtime/build/jacoco/test.exec
